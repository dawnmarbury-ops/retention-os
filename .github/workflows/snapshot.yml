name: Portfolio Snapshot (Phase 4)

on:
  push:
    branches:
      - phase-4-snapshotter
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # daily at 02:00 UTC (adjust if needed)

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    env:
      # Safe default; set a repo secret named DRY_RUN="false" to run live
      DRY_RUN: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Show repo top-level (debug)
        run: |
          echo "Running on branch: $(git rev-parse --abbrev-ref HEAD)"
          ls -la

      - name: Install Python dependencies (best-effort)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          else
            echo "requirements.txt not found — continuing"
          fi

      - name: Run snapshotter and capture logs
        env:
          ALCHEMY_ETH_KEY: ${{ secrets.ALCHEMY_ETH_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          DRY_RUN: ${{ env.DRY_RUN }}
        run: |
          set -o pipefail || true
          mkdir -p out/snapshots
          echo "DRY_RUN=${DRY_RUN}"
          echo "Running scripts/snapshotter.py..."
          python3 scripts/snapshotter.py 2>&1 | tee snapshotter.log || true
          echo "---- snapshotter run log (tail) ----"
          tail -n 200 snapshotter.log || true

      - name: Inspect snapshot output (debug)
        run: |
          echo "Listing out/snapshots:"
          ls -lah out/snapshots || true
          FILE="out/snapshots/positions.latest.json"
          if [ -f "$FILE" ]; then
            echo "File exists: $FILE"
            echo "Size (bytes): $(wc -c < "$FILE" || echo 0)"
            echo "Preview (first 200 lines):"
            head -n 200 "$FILE" || true
          else
            echo "positions.latest.json not found"
          fi

      - name: Create fallback JSON if missing/small (dry-run fallback)
        run: |
          FILE="out/snapshots/positions.latest.json"
          SIZE=0
          if [ -f "$FILE" ]; then SIZE=$(wc -c < "$FILE" || echo 0); fi
          echo "Existing size = $SIZE"
          if [ "$SIZE" -lt 200 ]; then
            echo "Creating fallback test JSON (dry run)"
            mkdir -p out/snapshots
            python3 - <<'PY' > out/snapshots/positions.latest.json
import json,datetime
test = {
  "generated_at": datetime.datetime.utcnow().isoformat() + "Z",
  "run_id": "dry_run_fallback",
  "total_nav_usd": 10000.00,
  "positions":[
    {"symbol":"ETH","qty":2.0,"price_usd":3200,"nav_usd":6400,"weight":0.64},
    {"symbol":"WELL","qty":10,"price_usd":1.2,"nav_usd":12,"weight":0.0012}
  ]
}
print(json.dumps(test, indent=2))
PY
          fi
          echo "After fallback listing:"
          ls -lah out/snapshots || true
          wc -c out/snapshots/positions.latest.json || true
          head -n 50 out/snapshots/positions.latest.json || true

      - name: Commit & push snapshot (only if valid)
        env:
          # Use repo secret GITHUB_TOKEN (the default provided token should work)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE="out/snapshots/positions.latest.json"
          if [ ! -f "$FILE" ]; then
            echo "No snapshot file to commit" && exit 1
          fi
          SIZE=$(wc -c < "$FILE" || echo 0)
          echo "positions.latest.json size=$SIZE"
          # Only commit when >= 200 bytes to avoid placeholder commits
          if [ "$SIZE" -ge 200 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$FILE"
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Auto-update positions.latest.json — $(date -u +"%Y-%m-%dT%H:%M:%SZ")" || true
              # push back to the known branch
              git push origin HEAD:phase-4-snapshotter || git push
            fi
          else
            echo "File too small (<200 bytes). Not committing."
            exit 1
          fi
