name: Generate Snapshot JSON

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    env:
      # default to dry-run; set a repo secret DRY_RUN to "false" to run for real
      DRY_RUN: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Show top-level repo (debug)
        run: |
          echo "PWD: $(pwd)"
          ls -la

      - name: Install Python deps (best-effort)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          else
            echo "requirements.txt not found — continuing"
          fi

      - name: Prepare env preview
        env:
          ALCHEMY_ETH_KEY: ${{ secrets.ALCHEMY_ETH_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: |
          echo "Using DRY_RUN=${DRY_RUN}"
          echo "Secrets: (ALCHEMY_ETH_KEY set?)"
          if [ -z "${ALCHEMY_ETH_KEY}" ]; then
            echo "ALCHEMY_ETH_KEY: NOT SET"
          else
            echo "ALCHEMY_ETH_KEY: SET"
          fi
          # do not print secrets values

      - name: Run snapshotter (capture stdout/stderr)
        env:
          ALCHEMY_ETH_KEY: ${{ secrets.ALCHEMY_ETH_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          DRY_RUN: ${{ env.DRY_RUN }}
        run: |
          set -o pipefail || true
          mkdir -p out/snapshots
          echo "Running scripts/snapshotter.py with DRY_RUN=${DRY_RUN}"
          python3 scripts/snapshotter.py 2>&1 | tee snapshotter_run.log || true
          echo "---- snapshotter run log (last 200 lines) ----"
          tail -n 200 snapshotter_run.log || true

      - name: Debug snapshots dir and file
        run: |
          echo "Listing out/snapshots"
          ls -lah out/snapshots || true
          if [ -f out/snapshots/positions.latest.json ]; then
            echo "positions.latest.json exists"
            echo "Size (bytes): $(wc -c < out/snapshots/positions.latest.json || echo 0)"
            echo "Head (first 200 lines):"
            head -n 200 out/snapshots/positions.latest.json || true
          else
            echo "positions.latest.json not found"
          fi

      - name: Create fallback JSON if file missing or too small (dry-run fallback)
        env:
          DRY_RUN: ${{ env.DRY_RUN }}
        run: |
          SIZE=0
          if [ -f out/snapshots/positions.latest.json ]; then
            SIZE=$(wc -c < out/snapshots/positions.latest.json || echo 0)
          fi
          echo "Existing size = $SIZE"
          if [ "$SIZE" -lt 200 ]; then
            echo "Creating fallback test JSON (dry run)"
            mkdir -p out/snapshots
            python3 - <<'PY' > out/snapshots/positions.latest.json
import json,datetime
test = {
  "generated_at": datetime.datetime.utcnow().isoformat() + "Z",
  "run_id": "dry_run_fallback",
  "total_nav_usd": 10000.00,
  "positions":[
    {"symbol":"ETH","qty":2.5,"price_usd":3200,"nav_usd":8000,"weight":0.8},
    {"symbol":"WELL","qty":10,"price_usd":1.2,"nav_usd":12,"weight":0.0012}
  ]
}
print(json.dumps(test, indent=2))
PY
          fi
          echo "After fallback:"
          ls -lah out/snapshots || true
          wc -c out/snapshots/positions.latest.json || true
          head -n 200 out/snapshots/positions.latest.json || true

      - name: Commit and push snapshot if file valid
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f out/snapshots/positions.latest.json ]; then
            echo "No positions.latest.json to commit" && exit 1
          fi
          SIZE=$(wc -c < out/snapshots/positions.latest.json || echo 0)
          echo "positions.latest.json size=$SIZE"
          if [ "$SIZE" -ge 200 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add out/snapshots/positions.latest.json
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Auto-update positions.latest.json — $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              git push origin HEAD:${{ github.ref_name }} || git push
            fi
          else
            echo "File too small (<200 bytes). Not committing."
            exit 1
          fi
