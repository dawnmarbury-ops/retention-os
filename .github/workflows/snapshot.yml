name: Portfolio Snapshot Dry-Run
on: [push]
jobs:
  run-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run Snapshotter (dry-run)
        env:
          DRY_RUN: "true"
          WALLET_ADDRESSES: ""
        run: |
          python3 -m pip install --upgrade pip
          python3 scripts/snapshotter.py 2>&1 | tee snapshot_run.log
      - name: Upload snapshot_run.log (optional convenience)
        uses: actions/upload-artifact@v4
        with:
          name: snapshot_run_log
          path: snapshot_run.log
