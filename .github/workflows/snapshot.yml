name: snapshot

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in DRY_RUN mode (no write, no commit)"
        type: boolean
        default: true
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run snapshotter
        env:
          ALCHEMY_ETH_KEY: ${{ secrets.ALCHEMY_ETH_KEY }}
          EVM_ADDRESSES: ${{ secrets.EVM_ADDRESSES }}
          BTC_ADDRESSES: ${{ secrets.BTC_ADDRESSES }}
          SOL_ADDRESSES: ${{ secrets.SOL_ADDRESSES }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && 'true' || '' }}
        run: python scripts/snapshotter.py

      - name: Validate snapshot
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: python scripts/validate_snapshot.py

      - name: Commit snapshot
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add out/snapshots/
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit"
            exit 0
          fi
          git commit -m "chore(snapshot): automated snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
