name: Portfolio Snapshot Dry-Run
on: push

jobs:
  run-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3

      - name: 2. Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. Verify Files Exist
        run: |
          ls -R scripts/
          
      - name: 4. Execute Snapshot Script
        env:
          DRY_RUN: "true"
        run: |
          python3 scripts/snapshotter.py | tee snapshot_run.log

      - name: 5. Save Data as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-snapshots
          path: |
            snapshot_run.log
            out/snapshots/*.json
